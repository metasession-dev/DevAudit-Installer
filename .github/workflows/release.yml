name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Used only when manually triggered.'
        required: true

permissions:
  contents: write   # for `gh release create`
  id-token: write   # for `npm publish --provenance` (SLSA)

jobs:
  publish:
    name: Publish 4 packages to npmjs.org + create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # ----- Step 1: plugin-sdk (no internal deps) -----
      - name: plugin-sdk — install + build + publish
        working-directory: plugin-sdk
        run: |
          npm install --legacy-peer-deps
          npm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----- Step 2: rewrite file:../plugin-sdk → ^X.Y.Z in dependents -----
      # The file: ref keeps local dev working from a fresh clone. At publish
      # time we swap it to the version we just published, so the published
      # tarballs depend on a real semver range rather than a missing path.
      # The swap is in-place but never committed back.
      - name: Pin plugin-sdk version in dependents
        run: |
          set -euo pipefail
          VER=$(jq -r .version plugin-sdk/package.json)
          echo "Pinning @metasession.co/devaudit-plugin-sdk to ^$VER in dependents"
          for dir in cli plugins/devaudit-plugin-prisma plugins/devaudit-plugin-evidence-export; do
            jq --arg v "^$VER" \
              '.dependencies["@metasession.co/devaudit-plugin-sdk"] = $v' \
              "$dir/package.json" > "$dir/package.json.tmp"
            mv "$dir/package.json.tmp" "$dir/package.json"
            echo "  $dir → $(jq -r '.dependencies["@metasession.co/devaudit-plugin-sdk"]' $dir/package.json)"
          done

      # ----- Step 3: cli -----
      - name: cli — install + build + publish
        working-directory: cli
        run: |
          npm install --legacy-peer-deps
          npm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----- Step 4: plugins -----
      - name: prisma plugin — install + build + publish
        working-directory: plugins/devaudit-plugin-prisma
        run: |
          npm install --legacy-peer-deps
          npm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: evidence-export plugin — install + build + publish
        working-directory: plugins/devaudit-plugin-evidence-export
        run: |
          npm install --legacy-peer-deps
          npm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ----- Step 5: GitHub Release with auto-generated notes -----
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME:-v${{ inputs.version }}}"
          echo "Creating GitHub Release $TAG"
          gh release create "$TAG" --generate-notes --title "$TAG"

      # ----- Step 6: File bump issues on active consumers -----
      #
      # Phase 2 of the consumer-bump-via-issue process. Reads
      # docs/active-consumers.json + opens one GitHub issue per active
      # consumer using the body rendered by
      # scripts/render-bump-issue-body.sh. Issues land unlabelled (=
      # routine priority); the operator promotes via `priority:high` /
      # `priority:medium` labels when warranted. The per-consumer
      # devaudit-version-drift.yml workflow (synced via the CLI as part
      # of the same release) escalates the `overdue` label when target-
      # action dates pass.
      #
      # Uses DEVAUDIT_USER_TOKEN — needs `issues:write` on each
      # consumer in the registry. Same PAT already used for cross-repo
      # automation; failure here doesn't unwind the npm publish (issue-
      # filing is best-effort post-publish).
      - name: File bump issues on active consumers
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.DEVAUDIT_USER_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-v${{ inputs.version }}}"
          REGISTRY=docs/active-consumers.json
          if [ ! -f "$REGISTRY" ]; then
            echo "::warning::$REGISTRY not found; skipping auto-issue-filing."
            exit 0
          fi
          # Iterate active_consumers, NOT _paused_consumers.
          jq -c '.active_consumers[]' "$REGISTRY" | while read -r row; do
            repo=$(echo "$row" | jq -r '.repo')
            short_name=$(echo "$row" | jq -r '.short_name // .repo')
            echo "Filing bump issue on $repo (as $short_name)…"
            CONSUMER_NAME="$short_name" \
              ./scripts/render-bump-issue-body.sh "$TAG" \
              | gh issue create --repo "$repo" \
                  --title "chore: bump devaudit to $TAG" \
                  --body-file - \
                  --label "type:chore,area:tooling" \
              || echo "::warning::Failed to file bump issue on $repo. Continue."
          done
