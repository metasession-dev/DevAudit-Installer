name: Plugin SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'plugin-sdk/**'
      - '.github/workflows/plugin-sdk.yml'
  pull_request:
    paths:
      - 'plugin-sdk/**'
      - '.github/workflows/plugin-sdk.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    defaults:
      run:
        working-directory: plugin-sdk
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: plugin-sdk/package-lock.json
      - run: npm install --legacy-peer-deps
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
