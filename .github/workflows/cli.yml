name: CLI CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'plugin-sdk/**'
      - 'sdlc/files/ci/**'
      - 'contracts/evidence-types.json'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    defaults:
      run:
        working-directory: cli
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect CLI test-surface changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "reason=push-to-main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"

          echo "Changed files between $BASE_SHA and $HEAD_SHA:"
          printf '%s\n' "$CHANGED"

          if printf '%s\n' "$CHANGED" | grep -Eq '^(cli/|plugin-sdk/|sdlc/files/ci/|contracts/evidence-types\.json$|\.github/workflows/cli\.yml$)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "reason=docs-or-unrelated-pr" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.run_tests == 'true'
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Build plugin-sdk (cli depends on it via file:)
        if: steps.changes.outputs.run_tests == 'true'
        working-directory: plugin-sdk
        run: |
          npm install --legacy-peer-deps
          npm run build
      - if: steps.changes.outputs.run_tests == 'true'
        run: npm install --legacy-peer-deps
      - name: TypeScript
        if: steps.changes.outputs.run_tests == 'true'
        run: npx tsc --noEmit
      - name: Build
        if: steps.changes.outputs.run_tests == 'true'
        run: npm run build
      - name: Test
        if: steps.changes.outputs.run_tests == 'true'
        run: npm test
      - name: Smoke --help
        if: steps.changes.outputs.run_tests == 'true'
        run: node ./bin/devaudit.js --help
      - name: Smoke --version
        if: steps.changes.outputs.run_tests == 'true'
        run: node ./bin/devaudit.js --version
      - name: Docs-only success path
        if: steps.changes.outputs.run_tests != 'true'
        run: |
          echo "No CLI test-surface changes detected."
          echo "Marking required Test check green for docs-only or unrelated PR."
