name: CLI CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    defaults:
      run:
        working-directory: cli
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - run: npm install --legacy-peer-deps
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Smoke --help
        run: node ./bin/devaudit.js --help
      - name: Smoke --version
        run: node ./bin/devaudit.js --version
