name: Plugin (prisma) CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/devaudit-plugin-prisma/**'
      - 'plugin-sdk/**'
      - '.github/workflows/plugin-prisma.yml'
  pull_request:
    paths:
      - 'plugins/devaudit-plugin-prisma/**'
      - 'plugin-sdk/**'
      - '.github/workflows/plugin-prisma.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22']
    defaults:
      run:
        working-directory: plugins/devaudit-plugin-prisma
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: plugins/devaudit-plugin-prisma/package-lock.json
      - name: Build plugin-sdk (plugin depends on it via file:)
        working-directory: plugin-sdk
        run: |
          npm install --legacy-peer-deps
          npm run build
      - run: npm install --legacy-peer-deps
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
